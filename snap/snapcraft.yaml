name: fl_api_hub
version: 1.0.0
summary: Generated by Icons Launcher
description: Generated by Icons Launcher package for Linux.

confinement: strict
base: core22
grade: stable

slots:
  dbus-fl_api_hub: # adjust accordingly to your app name
    interface: dbus
    bus: session
    name: org.bar.fl_api_hub # adjust accordingly to your app name

apps:
  fl_api_hub:
    command: fl_api_hub
    extensions: [gnome] # gnome includes the libraries required by flutter
    plugs:
    - network
    slots:
      - dbus-fl_api_hub
parts:
  fl_api_hub:
    source: .
    plugin: flutter
    flutter-target: lib/main.dart # The main entry-point file of the application
